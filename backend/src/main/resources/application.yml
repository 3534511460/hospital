server:
  port: 8080
  servlet:
    context-path: /

spring:
  config:
    import: optional:classpath:application-local.yml
  datasource:
    url: jdbc:mysql://localhost:3306/hospital_appointment?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 30000

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 20MB

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.hospital.appointment.module.*.model
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    com.hospital.appointment: debug
    org.springframework.web: info

app:
  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000
  jwt:
    secret: hospital-appointment-system-jwt-secret-key-2026-prod
    access-token-expiration: 3600000
    refresh-token-expiration: 604800000
  file:
    upload-path: ./uploads
    allowed-extensions: jpg,jpeg,png,gif,pdf,doc,docx
    max-size: 10485760
  sms:
    provider: mock
    access-key:
    secret-key:
    sign-name: 医院预约系统
  ai:
    provider: deepseek
    api-key: ""
    api-url: https://api.deepseek.com/v1
    model: deepseek-chat
    max-tokens: 2000
    temperature: 0.7
